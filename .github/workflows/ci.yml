name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat > .env <<EOF
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=labdb
          DB_USER=postgres
          DB_PASSWORD=123456
          EOF
      - name: Check Docker Compose Dev config
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config

      - name: Check Docker Compose Dev config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build services
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml build

      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
      
      - name: Wait for backend
        run: sleep 10

      - name: Test health endpoint
        run: curl --fail http://localhost/api/health

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-postgres-lab:latest

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v